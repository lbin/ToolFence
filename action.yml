name: ToolFence Skill/MCP Scan
description: Inventory and risk scan AI agent MCP configs and skills.
inputs:
  root:
    description: Project root to scan.
    required: false
    default: "."
  format:
    description: Output format: summary, json, or sarif.
    required: false
    default: "sarif"
  output:
    description: Output file path.
    required: false
    default: "toolfence-results.sarif"
  fail-on:
    description: Minimum severity that fails the job.
    required: false
    default: "high"
runs:
  using: composite
  steps:
    - name: Install ToolFence
      shell: bash
      run: python -m pip install "${GITHUB_ACTION_PATH}"
    - name: Run ToolFence
      shell: bash
      run: >
        toolfence scan
        --root "${{ inputs.root }}"
        --format "${{ inputs.format }}"
        --output "${{ inputs.output }}"
        --fail-on "${{ inputs.fail-on }}"

